<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbsanii's demos</title>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #f4ebf2, #e5f0f9, #e8f5e9);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #2d2d2d;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-size: 200% 200%;
            animation: gradientShift 20s ease infinite;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .container {
            width: 90%; max-width: 600px; margin-top: 10vh;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 3rem; text-align: center;
            z-index: 10;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border);
            margin-bottom: 10px; background: rgba(255, 255, 255, 0.5);
        }

        #dragonfly {
            position: fixed; top: 0; left: 0; width: 120px; z-index: 999;
            pointer-events: none; transition: transform 3s linear;
        }
    </style>
</head>
<body>

    <svg id="dragonfly" viewBox="0 0 200 200">
        <path d="M 0 50 Q 50 0 100 50 Q 50 100 0 50 Z" fill="#a2d5c6"/>
    </svg>

    <div class="container">
        <div id="login-view" class="view-section active">
            <input type="password" id="pass" placeholder="Enter password..." />
            <button id="btn">Enter</button>
        </div>
        <div id="user-view" class="view-section"><h2>User Area</h2><ul id="list"></ul></div>
        <div id="admin-view" class="view-section"><h2>Admin Area</h2><ul id="admin-list"></ul></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAu7vFYtKtrebLerG4RYq-iLTANXz2G88Y",
            authDomain: "bbsanii.firebaseapp.com",
            projectId: "bbsanii",
            storageBucket: "bbsanii.firebasestorage.app",
            messagingSenderId: "266818867019",
            appId: "1:266818867019:web:c70c482f19f318ddb322ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- PASSWORD LOGIC ---
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('btn');
            const pass = document.getElementById('pass');
            
            btn.onclick = () => {
                const val = pass.value.toLowerCase().trim();
                if(val === 'dragonfly') {
                    document.getElementById('login-view').classList.remove('active');
                    document.getElementById('user-view').classList.add('active');
                } else if(val === 'owner') {
                    document.getElementById('login-view').classList.remove('active');
                    document.getElementById('admin-view').classList.add('active');
                } else {
                    alert("Incorrect password");
                }
            };

            // --- DRAGONFLY MOVEMENT ---
            const df = document.getElementById('dragonfly');
            function move() {
                const x = Math.random() * (window.innerWidth - 150);
                const y = Math.random() * (window.innerHeight - 150);
                df.style.transform = `translate(${x}px, ${y}px)`;
            }
            setInterval(move, 3000);
            move();
        });
    </script>
</body>
</html>
